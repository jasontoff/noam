<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Noam's Racing</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #000;
      color: #fff;
      overflow: hidden;
    }
    canvas { display: block; }

    #menu {
      position: fixed; inset: 0;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    #menu h1 {
      font-size: 64px;
      letter-spacing: 8px;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #ff006e, #ffbe0b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    #menu .sub { opacity: 0.7; margin-bottom: 48px; letter-spacing: 2px; }
    .btn {
      width: 280px;
      padding: 18px;
      margin: 10px;
      font-size: 20px;
      font-weight: bold;
      letter-spacing: 2px;
      border: 2px solid #ffbe0b;
      background: transparent;
      color: #ffbe0b;
      cursor: pointer;
      transition: 0.2s;
      border-radius: 4px;
    }
    .btn:hover { background: #ffbe0b; color: #1a1a2e; transform: translateY(-2px); }

    #hud {
      position: fixed; top: 16px; left: 16px;
      font-size: 18px;
      text-shadow: 2px 2px 4px #000;
      display: none;
    }
    #hud .row { margin-bottom: 6px; }
    #hud .big { font-size: 28px; font-weight: bold; }
    #speedometer {
      position: fixed; bottom: 20px; right: 20px;
      font-size: 42px; font-weight: bold;
      text-shadow: 2px 2px 6px #000;
      display: none;
    }
    #speedometer small { font-size: 16px; opacity: 0.7; }

    #positions {
      position: fixed; top: 16px; right: 16px;
      background: rgba(0,0,0,0.5);
      padding: 12px 16px;
      border-radius: 6px;
      min-width: 180px;
      display: none;
    }
    #positions .pos { padding: 3px 0; }
    #positions .me { color: #ffbe0b; font-weight: bold; }

    #controls {
      position: fixed; bottom: 20px; left: 20px;
      font-size: 13px; opacity: 0.6;
      display: none;
    }

    #finish {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.85);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
    }
    #finish h2 { font-size: 72px; margin-bottom: 16px; }
    #finish .result { font-size: 28px; margin-bottom: 32px; }
    #finish .win { color: #ffbe0b; }
    #finish .lose { color: #ff006e; }
  </style>
</head>
<body>
  <div id="menu">
    <h1>NOAM'S RACING</h1>
    <div class="sub">Arcade Racer</div>
    <button class="btn" onclick="startGame('single')">SINGLE PLAYER</button>
    <button class="btn" onclick="startGame('multi')">MULTIPLAYER</button>
  </div>

  <div id="hud">
    <div class="row">Lap <span class="big" id="lap">1</span> / 3</div>
    <div class="row">Position <span class="big" id="position">-</span></div>
  </div>

  <div id="positions"></div>

  <div id="speedometer"><span id="speed">0</span> <small>KM/H</small></div>

  <div id="controls">
    W/↑ accelerate · S/↓ brake · A/D or ←/→ steer · SPACE handbrake
  </div>

  <div id="finish">
    <h2 id="finishTitle">FINISH</h2>
    <div class="result" id="finishResult"></div>
    <button class="btn" onclick="location.reload()">PLAY AGAIN</button>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
      }
    }
  </script>
  <script type="module" src="game.js"></script>
</body>
</html>
